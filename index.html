<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>資産寿命シミュレータ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 1. 全体 */
body {
  font-family: Arial, sans-serif;
  max-width: 1100px;
  margin: 20px auto;
  padding: 0 15px;  /* 両端余白追加 */
}

/* 2. タイトル */
h1 {
  font-size: 1.8rem;
  margin-bottom: 5px;
  text-align: center; /* 中央揃えで見やすく */
}

/* 3. グラフ固定 */
#chart {
  width: 100% !important;
  height: auto !important;
  max-height: 450px;
  display: block;
  margin: 0 auto 10px; /* 下に少し余白 */
}

/* 4. 入力フォームスクロール領域 */
#inputs {
  overflow-y: auto;
  max-height: calc(100vh - 520px);
  padding: 0 10px 20px; /* 横余白確保 */
  box-sizing: border-box;
}

/* 5. ラベル・スライダー */
label {
  display: block;
  margin-top: 8px;
  font-size: 1rem;
}

input[type=range] {
  width: 100%;
  height: 2rem;
  margin-top: 3px;
}

input[type=number] {
  width: 100px;
  font-size: 1rem;
  padding: 4px 6px;
}

input[type=checkbox] {
  transform: scale(1.3);
  margin-right: 6px;
}

/* 6. ボタン */
button {
  margin-top: 8px;
  padding: 0.9rem 1.8rem;
  font-size: 1rem;
  cursor: pointer;
}

/* 7. プリセットボタン横並び */
.presets {
  display: flex;
  gap: 6px;
  margin: 5px 0;
}

.presets button {
  flex: 1;
  padding: 0.9rem 0;
  font-size: 1rem;
}

/* 8. 結果表示 */
.result {
  font-size: 1.1rem;
  margin: 10px 0;
  font-weight: bold;
}

/* 9. 固定縦スクロール制御（横スクロール防止） */
html, body {
  overflow-x: hidden;
}

/* 10. メディアクエリ */

/* タブレット向け */
@media (max-width: 1024px) {
  body { padding: 0 20px; }
  h1 { font-size: 1.6rem; }
  button { font-size: 1rem; padding: 0.9rem 1.5rem; }
  input[type=range] { height: 1.9rem; }
  #chart { max-height: 400px; }
}

//* スマホ向け */
@media (max-width: 480px) {
  body { padding: 0 15px; }
  h1 { font-size: 1.6rem; } /* タイトル大きめ */
  button { font-size: 1.2rem; padding: 1rem 1.5rem; } /* タップしやすく文字も大きい */
  input[type=range] { height: 2.2rem; } /* スライダーも太く */
  input[type=number] { width: 100px; font-size: 1.1rem; } 
  label { font-size: 1.2rem; } /* ラベル大きく */
  .result { font-size: 1.3rem; } /* 結果文字大きめ */
  #chart { max-height: 350px; }
}
</style>
</head>

<body>
<div id="header">
<h1>資産寿命シミュレータ</h1>

<div id="chartBox">
  <canvas id="chart"></canvas>
</div>
</div>

<div id="controls">

<div id="inputs">
<label>現在年齢 <input type="number" id="age" value="50"></label>

<label>想定寿命 <span id="lifeVal"></span>歳
<input type="number" id="lifeExpect" min="60" max="120" value="85"></label>

<label>初期資産 <span id="assetVal"></span> 万円
<input type="range" id="asset" min="0" max="50000" step="500" value="20000"></label>

<label>リタイヤ年齢 <span id="retireVal"></span>
<input type="range" id="retire" min="40" max="80" value="65"></label>

<label>毎月貯金額（退職まで） <span id="saveVal"></span>
<input type="range" id="save" min="0" max="50" value="5"></label>

<label>退職金（万円） <span id="bonusVal"></span>
<input type="range" id="bonus" min="0" max="5000" value="1000"></label>

<label>退職後生活費（月） <span id="spendVal"></span>
<input type="range" id="spend" min="0" max="100" value="30"></label>

<label>年金（月） <span id="pensionVal"></span>
<input type="range" id="pension" min="0" max="50" value="15"></label>

<label>年金開始年齢 <span id="pensionAgeVal"></span>
<input type="range" id="pensionAge" min="60" max="75" value="65"></label>

<label>年利率 <span id="rateVal"></span>%
<input type="range" id="rate" min="0" max="10" step="0.1" value="3"></label>

<label>インフレ率 <span id="inflVal"></span>%
<input type="range" id="infl" min="0" max="5" step="0.1" value="1"></label>
  
<h3 class="preset-title">プリセット</h3>
<div class="preset">
  <button onclick="presetSafe()">安全</button>
  <button onclick="presetNormal()">標準</button>
  <button onclick="presetAggressive()">攻め</button>
</div>

<label><input type="checkbox" id="tax"> 運用益に税金（約20%）</label>

<h3>住宅購入</h3>
<label>購入年齢 <input type="number" id="homeAge" value="60"></label>
<label>頭金（万円） <input type="number" id="down" value="1000"></label>
<label>月返済（万円） <input type="number" id="loanPay" value="10"></label>
<label>返済年数 <input type="number" id="loanYears" value="30"></label>

<label><input type="checkbox" id="fixedScale"> 縦軸固定（±5億円）</label>

<div class="result" id="result"></div>

<button onclick="runMonte()">確率計算（モンテカルロ）</button>
<button onclick="copyURL()">このシミュレーションを共有</button>

</div>  

</div>

<script>
const ctx=document.getElementById("chart").getContext("2d")
let chart

function updateLabels(){
 assetVal.textContent=asset.value
 retireVal.textContent=retire.value
 saveVal.textContent=save.value
 bonusVal.textContent=bonus.value
 spendVal.textContent=spend.value
 pensionVal.textContent=pension.value
 pensionAgeVal.textContent=pensionAge.value
 rateVal.textContent=rate.value
 inflVal.textContent=infl.value
}

function neededAsset(){
 const net = spend.value*12 - pension.value*12
 const r = rate.value/100
 return r>0 ? Math.round(net/r) : net*30
}

function simulate(random=false){
 let ageV=+age.value,total=+asset.value,retireAge=+retire.value
 let saveY=+save.value*12,bonusY=+bonus.value
 let spendY=+spend.value*12,pensionY=+pension.value*12
 let pensionStart=+pensionAge.value
 let r=+rate.value/100,inflR=+infl.value/100
 let taxOn=tax.checked
 let homeAgeV=+homeAge.value,downV=+down.value
 let loanPayV=+loanPay.value*12,loanYearsV=+loanYears.value

 let labels=[],data=[],retireAsset=0,depletion=null

 for(let a=ageV;a<=120;a++){
   let rr=random ? r+(Math.random()-0.5)*0.3 : r
   let gain=total*rr
   if(taxOn && gain>0) gain*=0.8

   if(a<retireAge) total += gain + saveY
   else{
     if(a===retireAge){retireAsset=total; total+=bonusY}
     spendY*=1+inflR
     let inc=a>=pensionStart?pensionY:0
     total += gain + inc - spendY
   }

   if(a===homeAgeV) total-=downV
   if(a>=homeAgeV && a<homeAgeV+loanYearsV) total-=loanPayV

   if(total<=0 && depletion===null) depletion=a
   labels.push(a); data.push(total)
 }
 return {labels,data,retireAsset,depletion}
}

function yScale(data){
 const allPositive=data.every(v=>v>=0)
 const allNegative=data.every(v=>v<=0)
 if(fixedScale.checked) return {min:-50000,max:50000}
 if(allPositive) return {min:0}
 if(allNegative) return {max:0}
 return {}
}

function basePlugin(s){
  return {
    id:"lines",
    afterDraw(c){
      const {ctx,scales:{x,y}}=c

      // 0ライン
      const y0=y.getPixelForValue(0);
      ctx.lineWidth=3;
      ctx.strokeStyle="black";
      ctx.beginPath();
      ctx.moveTo(x.left,y0);
      ctx.lineTo(x.right,y0);
      ctx.stroke();

      // 資産枯渇年齢
      if(s.depletion){
        const px=x.getPixelForValue(s.depletion);
        ctx.strokeStyle="red";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(px,y.top);
        ctx.lineTo(px,y.bottom);
        ctx.stroke();
        ctx.fillStyle="red";
        ctx.fillText(`資産枯渇年齢：${s.depletion}歳`,px+5,y.top+15);
      }

      // 想定寿命ライン
      const pxLife = x.getPixelForValue(+lifeExpect.value);
      ctx.strokeStyle = "blue";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pxLife, y.top);
      ctx.lineTo(pxLife, y.bottom);
      ctx.stroke();
      ctx.fillStyle = "blue";
      ctx.fillText(`想定寿命：${lifeExpect.value}歳`, pxLife+5, y.top+30);
    }
  }
}

function splitSeries(labels,data){
 const pos=[],neg=[]
 labels.forEach((a,i)=>{
   const v=data[i]
   if(v>=0){
     pos.push({x:a,y:v})
     neg.push({x:a,y:null})
   }else{
     pos.push({x:a,y:null})
     neg.push({x:a,y:v})
   }
 })
 return {pos,neg}
}

function drawFixed(){

 updateLabels()
 const s=simulate(false)

  // 想定寿命でFIRE判定
  const life = +lifeExpect.value;
  const fire = s.data[life - age.value] > 0;

 result.innerHTML =
 `FIRE：${fire?"成立 ✅":"不成立 ❌"}<br>
  退職時資産：約${Math.round(s.retireAsset)}万円<br>
  資産枯渇年齢：${s.depletion?s.depletion+"歳":"なし"}<br>
  必要資産目安：約${neededAsset()}万円`

 const sp=splitSeries(s.labels,s.data)

 if(chart) chart.destroy()

 chart=new Chart(ctx,{
  type:"line",
  data:{datasets:[
   {data:sp.pos,borderColor:"green",backgroundColor:"rgba(0,150,0,0.15)",fill:true,pointRadius:3,pointBackgroundColor:"green",parsing:false},
   {data:sp.neg,borderColor:"red",backgroundColor:"rgba(255,0,0,0.15)",fill:true,pointRadius:3,pointBackgroundColor:"red",parsing:false}
  ]},
  options:{plugins:{legend:{display:false}},
   scales:{
    x:{type:"linear",min:s.labels[0],max:s.labels.at(-1),ticks:{stepSize:5},title:{display:true,text:"年齢"}},
    y:{title:{display:true,text:"資産（万円）"},...yScale(s.data)}
   }},
  plugins:[basePlugin(s)]
 })
}

function runMonte(){
  const base = simulate(false);   // 固定利率シミュレーション
  const trials = 60;
  let results = [];

  for(let i=0; i<trials; i++){
    const s = simulate(true);
    results.push(s.data);
  }

  const life = +lifeExpect.value; // 想定寿命

  // 想定寿命までに資産が枯渇した回数
  const fail = results.filter(r => r[life - age.value] <= 0).length;
  const prob = Math.round(fail / trials * 100);

  // FIRE判定（想定寿命まで残るか）
  const fire = base.data[life - age.value] > 0;

  // 結果表示を上書き
  result.innerHTML =
   `FIRE：${fire?"成立 ✅":"不成立 ❌"}<br>
    退職時資産：約${Math.round(base.retireAsset)}万円<br>
    資産枯渇年齢：${base.depletion ? base.depletion+"歳":"なし"}<br>
    必要資産目安：約${neededAsset()}万円<br>
    破綻確率：約${prob}%`;

  const finals = results.map(r=>r.at(-1));
  const best = results[finals.indexOf(Math.max(...finals))];
  const worst = results[finals.indexOf(Math.min(...finals))];

  const b = splitSeries(base.labels, best);
  const w = splitSeries(base.labels, worst);

  const grayLines = results.map(r=>({
    data: base.labels.map((a,i)=>({x:a,y:r[i]})),
    borderColor:"rgba(150,150,150,0.2)",
    pointRadius:0,
    parsing:false
  }));

  const blackLine = {
    data: base.labels.map((a,i)=>({x:a,y:base.data[i]})),
    borderColor:"black",
    borderWidth:2,
    pointRadius:3,
    pointBackgroundColor:"black",
    parsing:false
  };

  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    type:"line",
    data:{datasets:[
      ...grayLines,         // 一番下に描画（最初に）
      {data:b.pos,borderColor:"green",borderWidth:3,pointRadius:3,pointBackgroundColor:"green",parsing:false},
      {data:b.neg,borderColor:"green",borderWidth:3,pointRadius:3,pointBackgroundColor:"green",parsing:false},
      {data:w.pos,borderColor:"red",borderWidth:3,pointRadius:3,pointBackgroundColor:"red",parsing:false},
      {data:w.neg,borderColor:"red",borderWidth:3,pointWidth:3,pointBackgroundColor:"red",parsing:false},
      blackLine             // 固定利率の黒線も最後に追加（マーカー付き）
    ]},
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{type:"linear",min:base.labels[0],max:base.labels.at(-1),ticks:{stepSize:5},title:{display:true,text:"年齢"}},
        y:{title:{display:true,text:"資産（万円）"},...yScale(results.flat())}
      }
    },
    plugins:[basePlugin(base)]
  })
}

document.querySelectorAll("input").forEach(e=>e.oninput=()=>{
 drawFixed()
 saveToURL()
})
drawFixed()

// URLから復元
function loadFromURL(){
 const p=new URLSearchParams(location.search)

 if(p.get("age")) age.value=p.get("age")
 if(p.get("asset")) asset.value=p.get("asset")
 if(p.get("retire")) retire.value=p.get("retire")
 if(p.get("save")) save.value=p.get("save")
 if(p.get("bonus")) bonus.value=p.get("bonus")
 if(p.get("spend")) spend.value=p.get("spend")
 if(p.get("pension")) pension.value=p.get("pension")
 if(p.get("rate")) rate.value=p.get("rate")
 if(p.get("infl")) infl.value=p.get("infl")

 updateLabels()
}

function saveToURL(){
 const p=new URLSearchParams()

 p.set("age",age.value)
 p.set("asset",asset.value)
 p.set("retire",retire.value)
 p.set("save",save.value)
 p.set("bonus",bonus.value)
 p.set("spend",spend.value)
 p.set("pension",pension.value)
 p.set("rate",rate.value)
 p.set("infl",infl.value)

 history.replaceState(null,"","?"+p.toString())
}

loadFromURL()
drawFixed()

function copyURL(){
 const url=location.href
 navigator.clipboard.writeText(url)
 alert("URLをコピーしました！")
}

function presetSafe(){
 rate.value=2
 infl.value=1
 spend.value=25
 save.value=10
 applyPreset()
}

function presetNormal(){
 rate.value=4
 infl.value=2
 spend.value=30
 save.value=5
 applyPreset()
}

function presetAggressive(){
 rate.value=6
 infl.value=2.5
 spend.value=35
 save.value=3
 applyPreset()
}

function applyPreset(){
 updateLabels()
 drawFixed()
 saveToURL()
}

</script>

</body>
</html>
